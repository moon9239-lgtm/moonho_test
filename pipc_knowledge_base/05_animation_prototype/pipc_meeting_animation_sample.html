<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PIPC Meeting Animation Prototype</title>
  <style>
    :root {
      --navy: #153a5f;
      --navy2: #0f2742;
      --cyan: #26a9c9;
      --ink: #101826;
      --paper: #f6f8fb;
      --wood1: #b78355;
      --wood2: #704021;
      --line: #d7dee8;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: #e8edf4;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(780px, 1fr) 320px;
      grid-template-rows: minmax(500px, 1fr) 210px;
      gap: 12px;
      padding: 12px;
    }

    .stage {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(0,0,0,.03)),
        linear-gradient(180deg, #b68457 0 44%, #ead6bd 44% 100%);
      box-shadow: 0 16px 46px rgba(19, 35, 56, .18);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 2px, rgba(0,0,0,.025) 2px 72px),
        radial-gradient(circle at 50% 9%, rgba(255,255,255,.4), transparent 28%);
      pointer-events: none;
    }

    .badge {
      position: absolute;
      left: 18px;
      top: 16px;
      z-index: 30;
      max-width: 560px;
      border-radius: 10px;
      padding: 12px 20px;
      color: white;
      background: linear-gradient(90deg, #143a62, #1e527d);
      font-size: clamp(15px, 1.5vw, 20px);
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(7, 24, 43, .22);
    }

    .meta {
      position: absolute;
      left: 20px;
      top: 72px;
      z-index: 30;
      max-width: 500px;
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 10px;
      padding: 10px 13px;
      background: rgba(255,255,255,.86);
      color: #243449;
      font-size: 12px;
      line-height: 1.5;
      box-shadow: 0 10px 25px rgba(7, 24, 43, .1);
    }

    .emblem {
      position: absolute;
      top: 42px;
      left: 50%;
      z-index: 10;
      transform: translateX(-50%);
      text-align: center;
      color: #24303d;
      font-weight: 900;
    }

    .mark {
      width: 54px;
      height: 54px;
      margin: 0 auto 8px;
      border: 3px solid rgba(255,255,255,.45);
      border-radius: 50%;
      background: conic-gradient(#c74140 0 33%, #fafafa 33% 63%, #224d83 63%);
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
    }

    .flag {
      position: absolute;
      top: 56px;
      width: 34px;
      height: 150px;
      border-radius: 17px 17px 3px 3px;
      background: linear-gradient(90deg, #fff, #f7edcd, #fff);
      box-shadow: 0 10px 20px rgba(40,24,13,.16);
    }
    .flag::before {
      content: "";
      position: absolute;
      left: 15px;
      top: -22px;
      width: 5px;
      height: 194px;
      background: #89632d;
    }
    .flag.left { left: 88px; }
    .flag.right { right: 96px; }

    .table {
      position: absolute;
      left: 4.8%;
      right: 4.8%;
      bottom: 88px;
      z-index: 4;
      height: 190px;
      background: linear-gradient(#8b532e, #60331e);
      clip-path: polygon(4% 47%, 23% 18%, 77% 18%, 96% 47%, 90% 100%, 10% 100%);
      box-shadow: inset 0 12px 18px rgba(255,255,255,.08), 0 -6px 16px rgba(0,0,0,.08);
    }

    .front-table {
      position: absolute;
      left: 25%;
      right: 25%;
      bottom: 32px;
      z-index: 16;
      height: 86px;
      border-radius: 10px 10px 0 0;
      background: linear-gradient(#86502e, #62341e);
      box-shadow: inset 0 12px 18px rgba(255,255,255,.08), 0 -4px 18px rgba(0,0,0,.2);
    }

    .staff {
      position: absolute;
      left: 50%;
      bottom: 70px;
      z-index: 18;
      width: 118px;
      height: 158px;
      transform: translateX(-50%);
    }
    .staff .head {
      width: 86px;
      height: 74px;
      margin: 0 auto;
      border-radius: 48% 48% 42% 42%;
      background: radial-gradient(circle at 55% 34%, #333844, #10151c 72%);
    }
    .staff .body {
      width: 118px;
      height: 94px;
      margin-top: -6px;
      border-radius: 38px 38px 8px 8px;
      background: linear-gradient(90deg, #1d2936, #29384a);
    }
    .staff .name {
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translateX(-50%);
      white-space: nowrap;
      border-radius: 6px;
      padding: 5px 9px;
      background: rgba(9,18,28,.76);
      color: white;
      font-size: 12px;
      font-weight: 900;
    }
    .staff.speaking .head,
    .staff.speaking .body { animation: staffTalk .4s ease-in-out infinite alternate; }

    .member {
      position: absolute;
      z-index: 8;
      width: 116px;
      height: 184px;
      transition: filter .2s ease, transform .2s ease;
    }
    .member img {
      position: absolute;
      left: 50%;
      bottom: 24px;
      max-width: 122px;
      max-height: 166px;
      object-fit: contain;
      transform: translateX(-50%);
      filter: drop-shadow(0 10px 8px rgba(0,0,0,.18));
    }
    .member .mouth {
      display: none;
      position: absolute;
      left: 50%;
      top: 61px;
      z-index: 5;
      width: 17px;
      height: 6px;
      border-radius: 50%;
      background: #45211e;
      transform: translateX(-50%);
    }
    .member .nameplate {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      white-space: nowrap;
      border-radius: 5px;
      padding: 4px 8px;
      background: #171e28;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(0,0,0,.18);
    }
    .member.speaking {
      z-index: 24;
      filter: drop-shadow(0 0 18px rgba(38,169,201,.72));
    }
    .member.speaking img { animation: bob .48s ease-in-out infinite alternate; }
    .member.speaking .mouth { display: block; animation: mouth .18s steps(2, end) infinite; }
    .member.enter { animation: seatIn .9s ease both; }
    .member.exit { animation: seatOut .9s ease both; }

    .chair { left: 50%; top: 188px; transform: translateX(-50%); }
    .left1 { left: 10%; top: 288px; }
    .left2 { left: 18%; top: 238px; }
    .left3 { left: 27%; top: 210px; }
    .left4 { left: 37%; top: 194px; }
    .right1 { right: 37%; top: 194px; }
    .right2 { right: 27%; top: 210px; }
    .right3 { right: 18%; top: 238px; }
    .right4 { right: 10%; top: 288px; }

    .bubble {
      position: absolute;
      left: 50%;
      top: 124px;
      z-index: 35;
      min-width: 300px;
      max-width: 610px;
      transform: translateX(-50%);
      border: 2px solid rgba(38,169,201,.4);
      border-radius: 16px;
      padding: 13px 16px;
      background: rgba(255,255,255,.97);
      box-shadow: 0 18px 42px rgba(15,35,55,.2);
    }
    .bubble.staff { border-color: rgba(211,156,64,.48); }
    .bubble .speaker {
      margin-bottom: 5px;
      color: #0e4970;
      font-weight: 900;
    }
    .bubble .text {
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      font-size: 15px;
      line-height: 1.45;
    }

    .side {
      grid-row: 1 / span 2;
      display: flex;
      min-height: 0;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: #f8fafc;
      box-shadow: 0 12px 34px rgba(18,35,55,.12);
    }
    .side h2 {
      margin: 0 0 12px;
      color: #172337;
      font-size: 18px;
    }
    .agenda {
      margin-bottom: 10px;
      border: 1px solid #d9e0eb;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      transition: .2s ease;
    }
    .agenda .type {
      color: #60758b;
      font-size: 12px;
      font-weight: 900;
    }
    .agenda .title {
      margin-top: 5px;
      font-size: 14px;
      line-height: 1.38;
    }
    .agenda.active {
      border-color: var(--cyan);
      background: #eaf8fc;
      box-shadow: 0 8px 20px rgba(38,169,201,.14);
      transform: translateX(-2px);
    }
    .note {
      margin-top: auto;
      border-top: 1px solid #d8e0ea;
      padding-top: 14px;
      color: #40566e;
      font-size: 13px;
      line-height: 1.5;
    }

    .subtitle {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 395px;
      min-height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #111923;
      color: white;
      box-shadow: 0 14px 42px rgba(10,20,35,.22);
    }
    .caption {
      min-width: 0;
      padding: 16px 18px;
      border-right: 1px solid rgba(255,255,255,.1);
    }
    .who {
      display: flex;
      gap: 10px;
      align-items: center;
      color: #88d9ef;
      font-weight: 900;
    }
    .who span:first-child {
      border-radius: 999px;
      padding: 4px 10px;
      background: #274a6c;
      color: white;
    }
    .line {
      max-height: 96px;
      margin-top: 10px;
      overflow: auto;
      font-size: 18px;
      line-height: 1.55;
    }
    .progress {
      height: 5px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
    }
    .bar {
      height: 100%;
      width: 0;
      background: #31c0e3;
      transition: width .2s ease;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .controls button {
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      background: #e8f7fb;
      color: #0d4058;
      cursor: pointer;
      font-weight: 900;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd8e6;
      font-size: 13px;
      white-space: nowrap;
    }
    .flow {
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }
    .flow h3 {
      margin: 0 0 8px;
      color: #c9d8e7;
      font-size: 14px;
    }
    .turn {
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 8px 10px;
      color: #aebccd;
      cursor: pointer;
    }
    .turn strong { color: #fff; }
    .turn small {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      color: #8fa0b2;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .turn.active {
      border-color: #59cae8;
      background: #244c72;
    }

    @keyframes seatIn {
      from { opacity: 0; transform: translateY(70px) scale(.82); }
      to { opacity: 1; }
    }
    @keyframes seatOut {
      to { opacity: 0; transform: translateY(-35px) scale(.92); }
    }
    @keyframes bob {
      from { transform: translateX(-50%) translateY(0); }
      to { transform: translateX(-50%) translateY(-4px); }
    }
    @keyframes mouth {
      from { height: 3px; width: 13px; }
      to { height: 9px; width: 18px; }
    }
    @keyframes staffTalk {
      from { transform: translateY(0); }
      to { transform: translateY(-4px); }
    }

    @media (max-width: 1050px) {
      body { overflow: auto; }
      .app {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
        grid-template-rows: 570px 285px 300px;
      }
      .side { grid-row: 3; }
      .subtitle { grid-template-columns: 1fr; }
      .flow { display: none; }
    }
  </style>
</head>

  </div>

."},{"index":9,"speaker":"위원장 송경희","person":"송경희","memberId":"song_kyunghee","agendaId":"publicity","text":"의견이 없으므로, 의결안건 2번과 보고안건 1, 2번은 비공개로 하 고, 의결안건 1번은 공개 회의로 진행하겠습니다.","short":"의견이 없으므로, 의결안건 2번과 보고안건 1, 2번은 비공개로 하 고, 의결안건 1번은 공개 회의로 진행하겠습니다."},{"index":10,"speaker":"위원장 송경희","person":"송경희","memberId":"song_kyunghee","agendaId":"agenda1","text":"그러면 지금부터 의결안건을 심의하겠습니다. 먼저 의결안건 1 번, 공공기관의 개인정보보호 법규 위반행위에 대한 시정조치에 관한 건을 상정하겠습니다. [의사봉 3타]","short":"그러면 지금부터 의결안건을 심의하겠습니다. 먼저 의결안건 1 번, 공공기관의 개인정보보호 법규 위반행위에 대한 시정조치에 관한 건을 상정하겠습니다. [의사봉 3타]"},{"index":11,"speaker":"위원장 송경희","person":"송경희","memberId":"song_kyunghee","agendaId":"agenda1","text":"효율적인 회의 운영을 위해 이 안건은 2개 피심인별로 나누어 진행하겠습니다. 먼저 공무원연금공단입니다. 피심인 공무원연금공단 건에 대해서 조사조정국장께서 보고해 주시기 바랍니다.","short":"효율적인 회의 운영을 위해 이 안건은 2개 피심인별로 나누어 진행하겠습니다. 먼저 공무원연금공단입니다. 피심인 공무원연금공단 건에 대해서 조사조정국장께서 보고해 주시기 바랍니다."},{"index":12,"speaker":"조사조정국장 남석","person":"남석","memberId":"staff","agendaId":"agenda1","text":"안건 보고드리겠습니다. 조사 배경 및 피심인 현황입니다. 조사 배경은 연금업무지원시스템에 대한 피심인의 신고에 따라 조사에 착수 하였습니다. 해당 시스템은 우리 위원회가 지정한 공공시스템, 집중관리시스 템에 해당합니다. 피심인의 일반현황 및 개인정보 수집․이용 등의 처리 현황은 보시는 바와 같습니다. 사실관계를 보고드리겠습니다. 비공무원인 정 모 씨가 2022년 4월 경부터 총 다섯 차례에 걸쳐 공문서를 위조하여 피심인으로부터 자신이 재 직하지 않는 기관의 연금담당자 권한을 부여받은 후 ’23년 10월경까지 연금 업무지원시스템에 접속하여 공무원들의 개인정보를 조회․수정․다운로드한 바 있습니다. 피심인은 정 모 씨가 제출한 신청서에 신청자 서명이나 기관장 직인 누락, 위조 직인 날인 등 의심 정황이 있었음에도 해당 문서의 진위 검증을 제대 로 하지 않은 채 다섯 차례에 걸쳐 권한 신청을 모두 승인한 사실이 있습니 다. 상세한 경위는 3쪽 보시는 바와 같습니다. 4쪽, 유출 내용입니다. 공무원 1,036명의 인사기록카드를 포함하여 소득 및 기여금 납부내역 등 개인정보가 유출되었으며, 세부 현황은 보시는 바와 같 습니다. 5쪽, 유출 인지 및 대응 관련하여 72시간 이내에 유출 신고와 통지는 이루 어진 바 있습니다. 개인정보 처리 관련 사실관계입니다. 피심인은 전보, 업무 변경 등으로 기관의 연금담당자가 변경되었음에도 종전 담당자의 시스템 접 근 권한을 말소하지 않거나, 장기 미접속자의 접근권한을 그대로 방치하는 등 연금업무지원시스템의 접근권한 관리를 소홀히 한 사실이 있습니다. 6쪽입니다. 아울러 피심인은 2023년 11월 이전까지 연금업무지원시스템의 징수․급여․융자․주택 메뉴의 접속기록 항목 중 수행업무를 보관․관리하 지 않았으며, 피심인 소속 직원 외 각 기관 연금담당자의 접속기록은 점검하 지 않은 사실이 있었습니다. 피심인이 이처럼 2022년 4월경부터 2023년 10월경까지 신청서의 진위 검증 을 소홀히 하여 권한없는 자에게 다섯 차례에 걸쳐 연금업무지원시스템 접 근권한을 부여한 행위는 보호법 제24조 제3항및제29조, 개인정보의 안전성 확보조치 기준 제5조 제1항 위반에 해당하고, 전보, 업무 변경 등으로 연금 담당자 권한을 상실한 자의 시스템 접근 권한을 지체없이 말소하지 않은 행 위는 고시 제5조 제2항 위반에 해당하며, ’23년 11월 이전까지 연금업무지원 시스템의 접속기록을 보관․관리하면서 필수 항목의 보관을 누락한 행위는 보호법 제24조 제3항및제29조, 고시 제8조 제1항 위반에 해당하며, 개인정 보처리자로서 개인정보의 오․남용, 분실․도난․유출․위조․변조 또는 훼 손 등에 대응하기 위하여 개인정보처리시스템의 접속기록을 점검하지 않은 행위는 고시 제8조 제2항 위반에 해당한다고 판단하였습니다. 8쪽, 피심인의 주장 및 사무처 검토의견입니다. 피심인 측은 담당자의 업무 상 과실을 주장하며 과징금 대신 과태료를 부과해줄 것과 공표 및 공표명령 을 면제해 줄 것, 그리고 관련자 징계를 완료하여 징계권고를 제외하여 줄 것을 요청하고 있습니다. 이에 따른 사무처 검토의견입니다. 피심인은 국민의 민감․고유식별정보를 대량으로 처리하는 공공기관임에도 연금업무지원시스템에 대해 기본적인 적 정성 검증 절차를 마련․운영하지 않은 점, 동일인에게 1년 6개월에 걸쳐 반 복적으로 아무런 검증 없이 접근권한을 부여한 점, 당시 위임전결규칙이나 별도 지침 없이 담당자가 직접 승인하는 방식으로 운영하면서 접근권한의 점검도 소홀히 하는 등 피심인의 시스템 접근권한 관리 체계 부실이 승인 업무 소홀을 야기한 바 피심인의 주장은 불수용하는 것으로 검토하였습니다. 이에 따른 처분 내용으로 5억 3,200만 원의 과징금을 부과하며, 유출 및 안 전조치의무 위반에 책임이 있는 자에 대한 징계를 권고하고, 위원회 홈페이 지에 처분받은 사실을 1년간 공표하는 한편, 피심인의 홈페이지 초기화면 팝 업창에 10일 이상 12일 이하의 기간동안 공표하도록 명하고자 합니다. 이상 보고 마치겠습니다.","short":"안건 보고드리겠습니다. 조사 배경 및 피심인 현황입니다. 조사 배경은 연금업무지원시스템에 대한 피심인의 신고에 따라 조사에 착수 하였습니다. 해당 시스템은 우리 위원회가 지정한 공공시스템, 집중관리시스 템에 해당합니다. 피심인의 일반현황 및 개인정보 수집․이용..."},{"index":13,"speaker":"위원장 송경희","person":"송경희","memberId":"song_kyunghee","agendaId":"publicity","text":"수고하셨습니다. 위원님들께서 질문이나 의견 있으시면 말씀해 주시기 바랍니다. 특별한 말씀이나 의견이 없으신 것 같습니다. 사무처의 설명이 충실하게 된 것 같습니다. 그러면 사무처의 1안대로 의결하고자 하는데, 혹시 이의 있 으십니까? \u003c‘없습니다’ 하는 위원 있음\u003e","short":"수고하셨습니다. 위원님들께서 질문이나 의견 있으시면 말씀해 주시기 바랍니다. 특별한 말씀이나 의견이 없으신 것 같습니다. 사무처의 설명이 충실하게 된 것 같습니다. 그러면 사무처의 1안대로 의결하고자 하는데, 혹시 이의 있 으십니까? \u003c‘없습니다’ 하는 위원 ..."},{"index":14,"speaker":"위원장 송경희","person":"송경희","memberId":"song_kyunghee","agendaId":"agenda1","text":"그러면 이 안건은 1안으로 의결하겠습니다. 가결되었습니다. [의사봉 3타]","short":"그러면 이 안건은 1안으로 의결하겠습니다. 가결되었습니다. [의사봉 3타]"},{"index":15,"speaker":"위원장 송경희","person":"송경희","memberId":"song_kyunghee","agendaId":"agenda1","text":"다음은 피심인 강북구청 건에 대해서 심의하도록 하겠습니다. 조사조정국장께서 보고해 주시기 바랍니다.","short":"다음은 피심인 강북구청 건에 대해서 심의하도록 하겠습니다. 조사조정국장께서 보고해 주시기 바랍니다."},{"index":16,"speaker":"조사조정국장 남석","person":"남석","memberId":"staff","agendaId":"agenda1","text":"11쪽 보고드리겠습니다. 피심인의 개인정보 유출 신고에 따라 조사에 착수하였습니다. 피심인의 일반현황 및 개인정보 수집․이용 등 의 처리 현황은 보시는 바와 같습니다. 개인정보 유출 관련 사실관계 보고드리겠습니다. 해커가 2024년 3월경 강 북구청이 운영하는 DB 관리자페이지에 접속하여 다운로드 기능을 통해 개 인정보를 유출한 것으로 확인되었습니다. 유출 내용은 영상 제공을 신청한 경찰 973명의 개인정보에 해당됩니다. 유 출 인지 후 72시간 이내에 유출통지․신고는 이행하였으나 일부 항목은 누 락한 바 있습니다. 13쪽, 개인정보 처리 관련 사실관계를 보고드리겠습니다. 피심인은 개인정 보처리시스템에 대한 접속 권한을 IP 주소 등으로 제한하지 않고 있었고, 외 부에서 개인정보처리시스템에 접속하는 경우 안전한 접속 인증수단을 적용 하지 않아 해커의 IP 접속을 허용한 사실이 있었습니다. 아울러 피심인은 정보주체의 비밀번호를 안전하지 않은 암호화 알고리즘으 로 암호화한 사실이 있었으며, 개인정보취급자가 개인정보처리시스템에 접속 하여 처리한 기록을 1년 이상 보관․관리하지 않은 사실이 있었습니다. 14쪽, 아울러 피심인은 유출통지를 하면서 유출 등이 된 개인정보 항목, 유 출 등이 된 시점과 그 경위 및 개인정보처리자의 대응조치 및 피해 구제 절 차 등의 항목을 누락한 사실이 있었습니다. 법령 근거 및 위법성 판단 부분입니다. 먼저 피심인이 정보통신망을 통한 불법적인 접근 및 침해사고 방지를 위해 IP 주소 등으로 접속 권한을 제한 하지 않은 점, 또한 피심인이 외부에서 개인정보처리시스템에 접속하면서 안 전한 접속수단 또는 인증수단을 적용하지 않은 점, 피심인이 비밀번호를 안 전하지 않은 암호화 알고리즘으로 암호화하고 DB에 저장한 점, 피심인이 개 인정보취급자의 개인정보처리시스템에 대한 접속기록을 1년 이상 보관하지 않은 점은 안전조치의무 위반에 해당한다고 판단하였습니다. 다음 15쪽입니다. 아울러 피심인이 유출통지 시 유출 등이 된 개인정보 항 목, 유출 등이 된 시점과 그 경위 및 개인정보처리자의 대응조치 및 피해 구 제절차 등의 항목을 누락한 행위는 보호법 제34조 제1항 유출통지 의무 위 반에 해당한다고 판단하였습니다. 피심인은 보호법 위반 사실을 인정하고, 사전통지 및 의견제출 기간 내에 시정을 완료하였으므로 선처를 요청하고 있습니다. 이에 따른 처분내용(안)으로 피심인의 안전조치의무 위반에 따른 유출에 대하여 총 3억 7,800만 원의 과징금을 부과하고, 유출통지 의무 위반에 대하 여 480만 원의 과태료를 부과하며, 아울러 피심인이 유출통지 시 누락한 내 용에 대해 유출 대상자에게 통지할 것을 내용으로 하는 시정권고를 하고자 합니다. 아울러 피심인의 처분받은 사실을 개인정보 보호위원회 홈페이지에 1년간 공표하고, 피심인의 홈페이지 초기화면 팝업창에 2일 이상 5일 미만의 기간 동안 공표하도록 명하고자 합니다. 이상 보고 마치겠습니다.","short":"11쪽 보고드리겠습니다. 피심인의 개인정보 유출 신고에 따라 조사에 착수하였습니다. 피심인의 일반현황 및 개인정보 수집․이용 등 의 처리 현황은 보시는 바와 같습니다. 개인정보 유출 관련 사실관계 보고드리겠습니다. 해커가 2024년 3월경 강 북구청이 운영하는..."},{"index":17,"speaker":"위원장 송경희","person":"송경희","memberId":"song_kyunghee","agendaId":"agenda1","text":"수고하셨습니다. 위원님들께서는 의견이나 질문 있으시면 말씀 해 주시기 바랍니다.","short":"수고하셨습니다. 위원님들께서는 의견이나 질문 있으시면 말씀 해 주시기 바랍니다."},{"index":18,"speaker":"위원 김휘강","person":"김휘강","memberId":"kim_hwigang","agendaId":"agenda1","text":"한 가지 의견을 드리겠습니다. 일단 정리해 주신 것에 동의합니 다.     let index = -1;
    let playing = false;
    let timer = null;

    const membersEl = document.getElementById("members");
    const agendaList = document.getElementById("agendaList");
    const turnList = document.getElementById("turnList");
    const bubble = document.getElementById("bubble");
    const staff = document.getElementById("staff");

    document.getElementById("badge").textContent = `${meeting.meetingLabel} · 애니메이션 보기`;
    document.getElementById("meta").innerHTML =
      `<b>${meeting.title}</b><br>${meeting.date}<br>${meeting.place}<br>${meeting.attendees}`;

    meeting.members.forEach((m, i) => {
      const el = document.createElement("div");
      el.className = `member ${m.seat} enter`;
      el.dataset.id = m.id;
      el.style.animationDelay = `${i * 0.08}s`;
      el.innerHTML = `<img src="${m.asset}" alt="${m.name}"><div class="mouth"></div><div class="nameplate">${m.role} ${m.name}</div>`;
      membersEl.appendChild(el);
    });

    meeting.agendas.forEach((agenda) => {
      const el = document.createElement("div");
      el.className = "agenda";
      el.dataset.id = agenda.id;
      el.innerHTML = `<div class="type">${agenda.type}</div><div class="title">${agenda.title}</div>`;
      agendaList.appendChild(el);
    });

    meeting.utterances.forEach((turn, i) => {
      const el = document.createElement("div");
      el.className = "turn";
      el.dataset.i = i;
      el.innerHTML = `<strong>${String(i + 1).padStart(2, "0")} ${turn.speaker}</strong><small>${turn.short}</small>`;
      el.onclick = () => go(i, true);
      turnList.appendChild(el);
    });

    function duration(text) {
      const speed = parseFloat(document.getElementById("speed").value);
      return Math.max(1700, Math.min(9000, text.length * 38)) / speed;
    }

    function activeSpeaker(id) {
      document.querySelectorAll(".member").forEach((member) => {
        member.classList.toggle("speaking", member.dataset.id === id);
      });
      staff.classList.toggle("speaking", id === "staff");
    }

    function activeAgenda(id) {
      document.querySelectorAll(".agenda").forEach((agenda) => {
        agenda.classList.toggle("active", agenda.dataset.id === id);
      });
    }

    function go(nextIndex, manual = false) {
      clearTimeout(timer);
      index = Math.max(0, Math.min(meeting.utterances.length - 1, nextIndex));
      const turn = meeting.utterances[index];

      activeSpeaker(turn.memberId);
      activeAgenda(turn.agendaId);

      document.getElementById("speakerNow").textContent = turn.speaker;
      document.getElementById("stepNow").textContent = `${index + 1} / ${meeting.utterances.length}`;
      document.getElementById("captionLine").textContent = turn.text;
      document.getElementById("bar").style.width = `${((index + 1) / meeting.utterances.length) * 100}%`;

      bubble.className = `bubble ${turn.memberId === "staff" ? "staff" : ""}`;
      bubble.querySelector(".speaker").textContent = turn.speaker;
      bubble.querySelector(".text").textContent = turn.text;

      document.querySelectorAll(".turn").forEach((el) => {
        el.classList.toggle("active", Number(el.dataset.i) === index);
      });
      const activeTurn = document.querySelector(".turn.active");
      if (activeTurn) activeTurn.scrollIntoView({ block: "nearest" });

      if (playing && !manual) {
        timer = setTimeout(() => {
          index < meeting.utterances.length - 1 ? go(index + 1) : finish();
        }, duration(turn.text));
      }
    }

    function finish() {
      playing = false;
      document.getElementById("playBtn").textContent = "재생";
      activeSpeaker("");
      document.querySelectorAll(".member").forEach((member) => member.classList.add("exit"));
      document.getElementById("captionLine").textContent = "회의가 종료되어 위원들이 퇴장합니다.";
      bubble.querySelector(".speaker").textContent = "회의 종료";
      bubble.querySelector(".text").textContent = "위원들이 회의장을 나갑니다.";
    }

    function play() {
      if (!playing) {
        playing = true;
        document.getElementById("playBtn").textContent = "일시정지";
        document.querySelectorAll(".member").forEach((member) => member.classList.remove("exit"));
        go(index < 0 ? 0 : index);
      } else {
        playing = false;
        document.getElementById("playBtn").textContent = "재생";
        clearTimeout(timer);
        activeSpeaker("");
      }
    }

    function reset() {
      playing = false;
      clearTimeout(timer);
      index = -1;
      document.getElementById("playBtn").textContent = "재생";
      document.querySelectorAll(".member").forEach((member) => {
        member.classList.remove("exit", "speaking");
        member.classList.add("enter");
      });
      staff.classList.remove("speaking");
      activeAgenda("opening");
      document.getElementById("speakerNow").textContent = "대기";
      document.getElementById("stepNow").textContent = "입장 중";
      document.getElementById("captionLine").textContent = "위원들이 회의장에 입장해 착석하고 있습니다.";
      document.getElementById("bar").style.width = "0%";
      bubble.className = "bubble";
      bubble.querySelector(".speaker").textContent = "입장";
      bubble.querySelector(".text").textContent = "위원들이 회의장에 입장해 착석합니다.";
      document.querySelectorAll(".turn").forEach((el) => el.classList.remove("active"));
    }

    document.getElementById("playBtn").onclick = play;
    document.getElementById("nextBtn").onclick = () => go(index + 1, true);
    document.getElementById("prevBtn").onclick = () => go(index - 1, true);
    document.getElementById("resetBtn").onclick = reset;
    reset();
  </script>
</body>
</html>
