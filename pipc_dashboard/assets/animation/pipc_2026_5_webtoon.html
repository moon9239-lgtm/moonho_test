<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026년 제5회 보호위원회 웹툰</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      background: #f1eee9;
      color: #161616;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 18px 16px;
      text-align: center;
      background: #ffffff;
      border-bottom: 3px solid #111111;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 3.8vw, 38px);
      letter-spacing: 0;
    }
    header p {
      margin: 8px auto 0;
      max-width: 880px;
      line-height: 1.55;
    }
    main {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px 10px 48px;
    }
    .webtoon-page {
      margin: 0 auto 22px;
      background: #ffffff;
      box-shadow: 0 16px 44px rgba(0, 0, 0, .16);
    }
    .webtoon-page img {
      display: block;
      width: 100%;
      height: auto;
    }
    .source-note {
      margin: 0 auto 22px;
      padding: 14px 16px;
      background: #ffffff;
      border: 2px solid #111111;
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <header>
    <h1>2026년 제5회 개인정보보호위원회 전체회의 웹툰</h1>
    <p>기존 위원 PNG를 활용해 회의장 전경, 위원 질의, 조사보고, 의결 장면을 6페이지 웹툰 흐름으로 재구성했습니다.</p>
  </header>
  <main>
    <section class="source-note">송경희 위원장은 위원장석, 김휘강 위원은 위원석으로 배치했습니다. 말풍선은 속기록 발언을 웹툰용으로 압축한 요약입니다.</section>
    <article class="webtoon-page">
      <img src="./webtoon_pages/page_001.png" alt="웹툰 1페이지">
    </article>
    <article class="webtoon-page">
      <img src="./webtoon_pages/page_002.png" alt="웹툰 2페이지">
    </article>
    <article class="webtoon-page">
      <img src="./webtoon_pages/page_003.png" alt="웹툰 3페이지">
    </article>
    <article class="webtoon-page">
      <img src="./webtoon_pages/page_004.png" alt="웹툰 4페이지">
    </article>
    <article class="webtoon-page">
      <img src="./webtoon_pages/page_005.png" alt="웹툰 5페이지">
    </article>
    <article class="webtoon-page">
      <img src="./webtoon_pages/page_006.png" alt="웹툰 6페이지">
    </article>
  </main>
</body>
</html>
