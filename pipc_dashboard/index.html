<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>개인정보보호위원회 전체회의 분석 대시보드</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="대시보드 내비게이션">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">P</div>
          <div>
            <div class="brand-title">PIPC 분석</div>
            <div class="brand-subtitle">전체회의 데이터</div>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item active" type="button" data-tab="stats">
            <span class="nav-icon" aria-hidden="true"></span>
            <span>핵심 현황</span>
          </button>
          <button class="nav-item" type="button" data-tab="search">
            <span class="nav-icon" aria-hidden="true"></span>
            <span>안건 통합검색</span>
          </button>
          <button class="nav-item" type="button" data-tab="meeting">
            <span class="nav-icon" aria-hidden="true"></span>
            <span>회의별 확인</span>
          </button>
          <button class="nav-item" type="button" data-tab="commissioner">
            <span class="nav-icon" aria-hidden="true"></span>
            <span>위원 대시보드</span>
          </button>
          <button class="nav-item" type="button" data-tab="assistant">
            <span class="nav-icon" aria-hidden="true"></span>
            <span>신규 안건 도우미</span>
          </button>
        </nav>

        <div class="side-note">
          <div class="side-note-label">데이터 기준</div>
          <div id="snapshot-time">스냅샷 로딩 중</div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">개인정보보호위원회 전체회의</p>
            <h1 id="page-title">전체회의 통계·동향 대시보드</h1>
          </div>
          <div class="topbar-tools">
            <button class="tool-button" type="button" id="clear-filter">필터 초기화</button>
            <div class="filter-preview" id="filter-preview">필터 없음</div>
          </div>
        </header>

        <section class="tab-view active" id="tab-stats" aria-labelledby="page-title"></section>
        <section class="tab-view" id="tab-search"></section>
        <section class="tab-view" id="tab-meeting"></section>
        <section class="tab-view" id="tab-commissioner"></section>
        <section class="tab-view" id="tab-assistant"></section>
      </main>
    </div>

    <script src="./data/dashboard-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
